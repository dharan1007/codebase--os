name: my-project
services:
  postgres:
    image: postgres:16-alpine
    port: 5432
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: appdb
    volumes:
      - .cos/volumes/postgres:/var/lib/postgresql/data
    healthCheck: "pg_isready -U dev -d appdb"

  redis:
    image: redis:7-alpine
    port: 6379
    environment: {}
    healthCheck: "redis-cli ping"

  backend:
    command: "npm run dev"
    port: 3001
    environment:
      DATABASE_URL: postgres://dev:devpassword@localhost:5432/appdb
      REDIS_URL: redis://localhost:6379
      NODE_ENV: development
    dependsOn:
      - postgres
      - redis

  frontend:
    command: "npm run dev"
    port: 3000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    dependsOn:
      - backend